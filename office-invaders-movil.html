<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07091c">
<title>Office Invaders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #07091c; overflow: hidden; font-family: system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  #wrap { height: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; }
  canvas { touch-action: none; cursor: pointer; max-width: 100vw; max-height: 100dvh; aspect-ratio: 9 / 16; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="640"></canvas>
</div>
<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const W=360,H=640,MINY=H*0.45,MAXY=H-30;
const APPS=[{l:'W',c:'#185FA5'},{l:'X',c:'#0F6E56'},{l:'P',c:'#993C1D'},{l:'T',c:'#534AB7'},{l:'O',c:'#378ADD'},{l:'N',c:'#853FA5'}];
const PUPS=[{t:'triple',c:'#EF9F27',icon:'3x'},{t:'rapid',c:'#5DCAA5',icon:'>>'},{t:'shield',c:'#85B7EB',icon:'()'},{t:'life',c:'#ED93B1',icon:'+1'}];
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let ship,bullets,enemies,parts,pups,eb,boss,score,lives,level;
let spawnT=0,fireT=0,tick=0,combo=0,comboT=0,nextBoss=300,shake=0,escFlash=0,bossCount=0;
let keys={},AC=null;
let state='menu',menuT=0,newRec=false,menuFloat=[];
let record=0,toast='',toastT=0;
let padIndex=-1,padA=false;
try{record=parseInt(localStorage.getItem('oi_record')||'0',10)||0;}catch(e){}
function saveRecord(){try{localStorage.setItem('oi_record',String(record));}catch(e){}}
function say(t){toast=t;toastT=140;}
window.addEventListener('gamepadconnected',e=>{padIndex=e.gamepad.index;say('\uD83C\uDFAE Control conectado');});
window.addEventListener('gamepaddisconnected',e=>{if(e.gamepad.index===padIndex)padIndex=-1;});
function readPad(){
  if(padIndex<0)return null;
  const gp=navigator.getGamepads()[padIndex];
  if(!gp)return null;
  const dz=0.2;
  let gx=Math.abs(gp.axes[0])>dz?gp.axes[0]:0;
  let gy=Math.abs(gp.axes[1])>dz?gp.axes[1]:0;
  if(gp.buttons[14]&&gp.buttons[14].pressed)gx=-1;
  if(gp.buttons[15]&&gp.buttons[15].pressed)gx=1;
  if(gp.buttons[12]&&gp.buttons[12].pressed)gy=-1;
  if(gp.buttons[13]&&gp.buttons[13].pressed)gy=1;
  const a=gp.buttons[0]&&gp.buttons[0].pressed;
  return {gx:gx,gy:gy,a:a};
}
function padMenuPoll(){
  const p=readPad();
  if(!p)return;
  if(p.a&&!padA){
    padA=true;
    if(state==='menu')startGame();
    else if(state==='over'){state='menu';menuLoop();}
  }
  if(!p.a)padA=false;
}
for(let i=0;i<7;i++){const a=APPS[i%APPS.length];menuFloat.push({x:Math.random()*W,y:Math.random()*H,l:a.l,c:a.c,s:22+Math.random()*14,vy:0.3+Math.random()*0.5,wob:Math.random()*6.28});}
function snd(f,d,type,vol){
  try{
    if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(f,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(Math.max(40,f*0.5),AC.currentTime+d);
    g.gain.setValueAtTime(vol||0.06,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function buzz(ms){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
function reset(){
  ship={x:W/2,y:H-55,tx:W/2,ty:H-55,triple:0,rapid:0,shield:0};
  bullets=[];enemies=[];parts=[];pups=[];eb=[];boss=null;
  score=0;lives=3;level=1;tick=0;combo=0;comboT=0;nextBoss=300;shake=0;newRec=false;escFlash=0;bossCount=0;
  toast='';toastT=0;
}
function startGame(){reset();state='play';say('\u00a1No dejes pasar ninguno!');snd(440,0.12,'square');snd(660,0.12,'square');loop();}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function menuLoop(){
  if(state!=='menu')return;
  menuT++;padMenuPoll();
  ctx.fillStyle='#0d1030';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<40;i++){ctx.fillRect((i*97)%W,(i*67+menuT*(0.2+(i%3)*0.2))%H,2,2);}
  for(const f of menuFloat){
    f.y+=f.vy;f.wob+=0.02;
    if(f.y>H+40){f.y=-40;f.x=Math.random()*W;}
    const fx=f.x+Math.sin(f.wob)*12;
    ctx.globalAlpha=0.35;
    ctx.fillStyle=f.c;rr(ctx,fx,f.y,f.s,f.s,6);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='600 '+Math.floor(f.s*0.55)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.l,fx+f.s/2,f.y+f.s/2+1);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#F5C4B3';
  ctx.font='700 38px sans-serif';
  ctx.fillText('OFFICE',W/2,170);
  ctx.fillStyle='#9FE1CB';
  ctx.fillText('INVADERS',W/2,212);
  ctx.fillStyle='#F0997B';
  const sy=270+Math.sin(menuT*0.05)*5;
  ctx.beginPath();ctx.moveTo(W/2,sy-13);ctx.lineTo(W/2-16,sy+10);ctx.lineTo(W/2,sy+4);ctx.lineTo(W/2+16,sy+10);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)';
  rr(ctx,W/2-115,325,230,56,10);ctx.fill();
  ctx.fillStyle='#FAC775';ctx.font='600 13px sans-serif';
  ctx.fillText(record>0?'\uD83C\uDFC6 R\u00c9CORD':'R\u00c9CORD',W/2,344);
  ctx.fillStyle='#fff';ctx.font='600 24px sans-serif';
  ctx.fillText(record>0?record+' pts':'--- todav\u00eda nada',W/2,366);
  if(Math.floor(menuT/40)%2===0){
    ctx.fillStyle='#fff';ctx.font='600 18px sans-serif';
    ctx.fillText('\u25B6 Toca para jugar',W/2,450);
  }
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='400 12px sans-serif';
  ctx.fillText('Arrastra el dedo para moverte',W/2,540);
  ctx.fillText('Si un enemigo llega abajo pierdes vida',W/2,560);
  ctx.fillText('Jefes cada 300 pts \u00b7 combos x4',W/2,580);
  requestAnimationFrame(menuLoop);
}
function addScore(n){
  combo++;comboT=120;
  const mult=Math.min(4,1+Math.floor(combo/5));
  score+=n*mult;
  if(score>record&&!newRec&&record>0){newRec=true;say('\uD83C\uDFC6 \u00a1Nuevo r\u00e9cord, pap\u00e1!');snd(880,0.15,'triangle',0.08);snd(1100,0.2,'triangle',0.08);}
  const nl=1+Math.floor(score/200);
  if(nl>level){level=nl;snd(660,0.3,'triangle',0.08);say('Nivel '+level);}
  if(score>=nextBoss&&!boss){spawnBoss();nextBoss+=400;}
}
function spawn(){
  const a=APPS[Math.floor(Math.random()*APPS.length)];
  const s=28+Math.random()*12;
  enemies.push({x:20+Math.random()*(W-40-s),y:-s,s:s,l:a.l,c:a.c,vy:1+Math.random()*0.8+level*0.25,hp:level>=3&&Math.random()<0.3?2:1,wob:Math.random()*6.28,zig:Math.random()<0.25});
}
function spawnBoss(){
  bossCount++;
  if(bossCount%2===1){
    boss={kind:'update',x:W/2-70,y:-90,w:140,h:80,hp:20+level*8,maxhp:20+level*8,vx:1.5,t:0,entering:true};
    say('\u26A0 \u00a1ACTUALIZACI\u00d3N OBLIGATORIA!');
  }else{
    const hp=30+level*10;
    boss={kind:'word',x:W/2-55,y:-130,w:110,h:110,hp:hp,maxhp:hp,vx:1.8,t:0,entering:true,rage:false};
    say('\uD83D\uDCC4 \u00a1WORD GIGANTE!');
  }
  snd(110,0.6,'sawtooth',0.1);shake=10;buzz(200);
}
function boom(x,y,c,n){
  for(let i=0;i<(n||12);i++){
    const a=Math.random()*6.28,v=1+Math.random()*3;
    parts.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:20+Math.random()*10,c:c});
  }
}
function dropPup(x,y){
  if(Math.random()<0.14){
    const p=PUPS[Math.floor(Math.random()*PUPS.length)];
    pups.push({x:x,y:y,t:p.t,c:p.c,icon:p.icon,vy:1.5});
  }
}
function hurt(){
  if(ship.shield>0){ship.shield=0;snd(200,0.2,'triangle');boom(ship.x,ship.y,'#85B7EB',8);buzz(60);return;}
  lives--;combo=0;shake=8;
  snd(120,0.4,'sawtooth',0.1);boom(ship.x,ship.y,'#F0997B',16);buzz([80,40,80]);
  if(lives<=0)gameOver();
}
function enemyEscaped(){
  escFlash=30;
  say('\uD83D\uDC80 \u00a1Se te pas\u00f3 uno! -1 vida');
  hurt();
}
function loop(){
  if(state!=='play')return;
  tick++;if(comboT>0)comboT--;else combo=0;
  if(shake>0)shake--;if(escFlash>0)escFlash--;if(toastT>0)toastT--;
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  ctx.fillStyle='#0d1030';ctx.fillRect(-10,-10,W+20,H+20);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<40;i++){ctx.fillRect((i*97)%W,(i*67+tick*(0.3+(i%3)*0.3))%H,2,2);}
  if(escFlash>0){
    ctx.fillStyle='rgba(226,75,74,'+(escFlash/30*0.5)+')';
    ctx.fillRect(0,H-26,W,26);
  }
  const p=readPad();
  const L=keys.ArrowLeft||keys.a,R=keys.ArrowRight||keys.d,U=keys.ArrowUp||keys.w,D=keys.ArrowDown||keys.s;
  if(L)ship.tx-=6;if(R)ship.tx+=6;
  if(U)ship.ty-=6;if(D)ship.ty+=6;
  if(p){ship.tx+=p.gx*6.5;ship.ty+=p.gy*6.5;}
  ship.tx=Math.max(20,Math.min(W-20,ship.tx));
  ship.ty=Math.max(MINY,Math.min(MAXY,ship.ty));
  ship.x+=(ship.tx-ship.x)*0.3;
  ship.y+=(ship.ty-ship.y)*0.3;
  if(ship.shield>0){
    ship.shield--;
    ctx.strokeStyle='#85B7EB';ctx.lineWidth=2;ctx.globalAlpha=0.5+Math.sin(tick*0.2)*0.3;
    ctx.beginPath();ctx.arc(ship.x,ship.y,26,0,6.28);ctx.stroke();ctx.globalAlpha=1;
  }
  const lean=(L?-1:0)+(R?1:0)+(p?p.gx:0);
  ctx.save();
  ctx.translate(ship.x,ship.y);
  ctx.rotate(Math.max(-1,Math.min(1,lean))*0.15);
  ctx.fillStyle='#F5C4B3';
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(-17,10);ctx.lineTo(0,4);ctx.lineTo(17,10);ctx.closePath();ctx.fill();
  ctx.fillStyle='#D85A30';ctx.fillRect(-3,8,6,5+Math.random()*5+(U?4:0));
  ctx.restore();
  if(ship.triple>0)ship.triple--;if(ship.rapid>0)ship.rapid--;
  fireT++;
  const rate=ship.rapid>0?6:14;
  if(fireT>=rate){
    fireT=0;
    bullets.push({x:ship.x,y:ship.y-16,vx:0});
    if(ship.triple>0){bullets.push({x:ship.x-8,y:ship.y-10,vx:-1.5});bullets.push({x:ship.x+8,y:ship.y-10,vx:1.5});}
    snd(880,0.05,'square',0.02);
  }
  ctx.fillStyle='#9FE1CB';
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.y-=9;b.x+=b.vx;
    ctx.fillRect(b.x-2,b.y-8,4,10);
    if(b.y<-10||b.x<0||b.x>W)bullets.splice(i,1);
  }
  if(!boss){
    spawnT++;
    if(spawnT>=Math.max(24,70-level*6)){spawnT=0;spawn();}
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.y+=e.vy;e.wob+=0.05;
    const ex=e.x+Math.sin(e.wob)*(e.zig?24:8);
    ctx.fillStyle=e.c;rr(ctx,ex,e.y,e.s,e.s,6);ctx.fill();
    if(e.hp>1){ctx.strokeStyle='#fff';ctx.lineWidth=2;rr(ctx,ex,e.y,e.s,e.s,6);ctx.stroke();}
    ctx.fillStyle='#fff';ctx.font='600 '+Math.floor(e.s*0.55)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.l,ex+e.s/2,e.y+e.s/2+1);
    let dead=false;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(b.x>ex&&b.x<ex+e.s&&b.y>e.y&&b.y<e.y+e.s){
        bullets.splice(j,1);e.hp--;snd(660,0.06,'square',0.03);
        if(e.hp<=0)dead=true;
        break;
      }
    }
    if(dead){
      boom(ex+e.s/2,e.y+e.s/2,e.c);dropPup(ex+e.s/2,e.y+e.s/2);
      enemies.splice(i,1);addScore(10);snd(330,0.12,'square',0.05);
      continue;
    }
    const dx=Math.abs((ex+e.s/2)-ship.x),dy=Math.abs((e.y+e.s/2)-ship.y);
    if(dx<e.s/2+14&&dy<e.s/2+10){enemies.splice(i,1);hurt();if(state!=='play'){ctx.restore();return;}continue;}
    if(e.y>H){enemies.splice(i,1);enemyEscaped();if(state!=='play'){ctx.restore();return;}}
  }
  if(boss){
    const b=boss;b.t++;
    if(b.kind==='update'){
      if(b.entering){b.y+=1.5;if(b.y>=40)b.entering=false;}
      else{
        b.x+=b.vx;
        if(b.x<10||b.x+b.w>W-10)b.vx*=-1;
        if(b.t%50===0){
          eb.push({x:b.x+20,y:b.y+b.h,vy:3.5,vx:0,type:'dot'});
          eb.push({x:b.x+b.w-20,y:b.y+b.h,vy:3.5,vx:0,type:'dot'});
          if(level>=3)eb.push({x:b.x+b.w/2,y:b.y+b.h,vy:3,vx:(ship.x-b.x-b.w/2)*0.01,type:'dot'});
          snd(220,0.1,'sawtooth',0.04);
        }
      }
      ctx.fillStyle='#c9c9d4';rr(ctx,b.x,b.y,b.w,b.h,8);ctx.fill();
      ctx.fillStyle='#378ADD';rr(ctx,b.x,b.y,b.w,20,8);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='600 11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText('Actualizando... no apagues',b.x+8,b.y+10);
      ctx.fillText('\u2715',b.x+b.w-16,b.y+10);
      ctx.fillStyle='#0d1030';ctx.font='400 12px sans-serif';
      const pct=Math.round((1-b.hp/b.maxhp)*100);
      ctx.fillText('Instalando: '+pct+'%',b.x+12,b.y+40);
      ctx.strokeStyle='#378ADD';ctx.lineWidth=1;
      ctx.strokeRect(b.x+12,b.y+52,b.w-24,12);
      ctx.fillStyle='#378ADD';
      ctx.fillRect(b.x+12,b.y+52,(b.w-24)*(1-b.hp/b.maxhp),12);
    }else{
      if(b.entering){b.y+=1.5;if(b.y>=35)b.entering=false;}
      else{
        if(!b.rage&&b.hp<b.maxhp*0.4){b.rage=true;b.vx*=1.6;say('\uD83D\uDE21 \u00a1La W est\u00e1 furiosa!');snd(90,0.5,'sawtooth',0.1);shake=8;buzz(150);}
        b.x+=b.vx;
        if(b.x<5||b.x+b.w>W-5)b.vx*=-1;
        const gap=b.rage?26:42;
        if(b.t%gap===0){
          const l=LETTERS[Math.floor(Math.random()*26)];
          const lx=b.x+15+Math.random()*(b.w-30);
          eb.push({x:lx,y:b.y+b.h-8,vy:2.5+Math.random()*1.5,vx:(Math.random()-0.5)*1.2,type:'letter',l:l,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.15});
          snd(500+Math.random()*300,0.06,'square',0.03);
        }
        if(b.rage&&b.t%90===0){
          for(let k=-2;k<=2;k++){
            eb.push({x:b.x+b.w/2,y:b.y+b.h-8,vy:3,vx:k*1.1,type:'letter',l:LETTERS[Math.floor(Math.random()*26)],rot:0,vr:(Math.random()-0.5)*0.2});
          }
          snd(180,0.3,'sawtooth',0.08);
        }
      }
      const wob=Math.sin(b.t*0.06)*4;
      ctx.fillStyle='#185FA5';rr(ctx,b.x,b.y+wob,b.w,b.h,14);ctx.fill();
      if(b.rage){ctx.strokeStyle='#F09595';ctx.lineWidth=3;rr(ctx,b.x,b.y+wob,b.w,b.h,14);ctx.stroke();}
      ctx.fillStyle='#fff';ctx.font='700 64px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('W',b.x+b.w/2,b.y+b.h/2+wob+4);
      const eyy=b.y+wob+30;
      ctx.fillStyle=b.rage?'#F09595':'#fff';
      ctx.fillRect(b.x+26,eyy,10,b.rage?4:8);
      ctx.fillRect(b.x+b.w-36,eyy,10,b.rage?4:8);
      ctx.fillStyle='#0C447C';
      const barW=b.w-20;
      ctx.fillRect(b.x+10,b.y+wob+b.h-12,barW,6);
      ctx.fillStyle=b.rage?'#F09595':'#9FE1CB';
      ctx.fillRect(b.x+10,b.y+wob+b.h-12,barW*(b.hp/b.maxhp),6);
    }
    for(let j=bullets.length-1;j>=0;j--){
      const bl=bullets[j];
      if(bl.x>b.x&&bl.x<b.x+b.w&&bl.y>b.y&&bl.y<b.y+b.h){
        bullets.splice(j,1);b.hp--;snd(150,0.05,'sawtooth',0.04);
        parts.push({x:bl.x,y:bl.y,vx:(Math.random()-0.5)*2,vy:-1,life:12,c:'#fff'});
        if(b.hp<=0){
          const isWord=b.kind==='word';
          boom(b.x+b.w/2,b.y+b.h/2,isWord?'#185FA5':'#378ADD',40);
          boom(b.x+b.w/2,b.y+b.h/2,'#c9c9d4',30);
          if(isWord){
            for(let k=0;k<10;k++){
              parts.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,c:'#B5D4F4',l:LETTERS[Math.floor(Math.random()*26)]});
            }
          }
          addScore(isWord?150:100);boss=null;shake=14;
          snd(80,0.8,'sawtooth',0.12);buzz([100,50,200]);
          say(isWord?'\uD83D\uDCC4\uD83D\uDCA5 \u00a1Documento destruido! +150':'Actualizaci\u00f3n cancelada \uD83D\uDE0E +100');
          pups.push({x:b.x+b.w/2,y:b.y+b.h/2,t:PUPS[Math.floor(Math.random()*PUPS.length)].t,c:'#EF9F27',icon:'?',vy:1.5});
          break;
        }
      }
    }
    if(boss){
      const dx=Math.abs((b.x+b.w/2)-ship.x),dy=Math.abs((b.y+b.h/2)-ship.y);
      if(dx<b.w/2+14&&dy<b.h/2+10)hurt();
      if(state!=='play'){ctx.restore();return;}
    }
  }
  for(let i=eb.length-1;i>=0;i--){
    const q=eb[i];q.y+=q.vy;q.x+=q.vx;
    if(q.type==='letter'){
      q.rot+=q.vr;
      ctx.save();
      ctx.translate(q.x,q.y);
      ctx.rotate(q.rot);
      ctx.fillStyle='#F09595';
      ctx.font='700 18px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(q.l,0,0);
      ctx.restore();
    }else{
      ctx.fillStyle='#F09595';
      ctx.beginPath();ctx.arc(q.x,q.y,5,0,6.28);ctx.fill();
    }
    const hr=q.type==='letter'?12:5;
    if(Math.abs(q.x-ship.x)<11+hr&&Math.abs(q.y-ship.y)<7+hr){eb.splice(i,1);hurt();if(state!=='play'){ctx.restore();return;}continue;}
    if(q.y>H+15||q.x<-15||q.x>W+15)eb.splice(i,1);
  }
  for(let i=pups.length-1;i>=0;i--){
    const q=pups[i];q.y+=q.vy;
    ctx.fillStyle=q.c;ctx.beginPath();ctx.arc(q.x,q.y,13,0,6.28);ctx.fill();
    ctx.fillStyle='#0d1030';ctx.font='600 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(q.icon,q.x,q.y+1);
    if(Math.abs(q.x-ship.x)<26&&Math.abs(q.y-ship.y)<22){
      snd(990,0.2,'triangle',0.07);buzz(40);
      if(q.t==='triple'){ship.triple=480;say('\uD83D\uDD25 Disparo triple');}
      if(q.t==='rapid'){ship.rapid=480;say('\u26A1 Metralleta activada');}
      if(q.t==='shield'){ship.shield=9999;say('\uD83D\uDEE1 Escudo activo (1 golpe)');}
      if(q.t==='life'){lives++;say('\u2764 +1 vida');}
      pups.splice(i,1);continue;
    }
    if(q.y>H+15)pups.splice(i,1);
  }
  for(let i=parts.length-1;i>=0;i--){
    const q=parts[i];q.x+=q.vx;q.y+=q.vy;q.life--;
    ctx.globalAlpha=Math.max(0,q.life/25);ctx.fillStyle=q.c;
    if(q.l){ctx.font='700 14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(q.l,q.x,q.y);}
    else ctx.fillRect(q.x-2,q.y-2,4,4);
    ctx.globalAlpha=1;
    if(q.life<=0)parts.splice(i,1);
  }
  ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='600 14px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(score+' pts',12,12);
  ctx.fillText('\u2764'.repeat(Math.max(0,Math.min(6,lives))),12,32);
  ctx.textAlign='right';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Nv '+level,W-12,12);
  if(record>0)ctx.fillText('\uD83C\uDFC6 '+record,W-12,32);
  if(combo>=5){
    ctx.fillStyle='#FAC775';ctx.textAlign='left';
    ctx.fillText('Combo x'+Math.min(4,1+Math.floor(combo/5)),12,54);
  }
  if(toastT>0){
    ctx.globalAlpha=Math.min(1,toastT/30);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.font='600 14px sans-serif';
    const tw=ctx.measureText(toast).width+24;
    rr(ctx,W/2-tw/2,86,tw,30,15);ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(toast,W/2,101);
    ctx.globalAlpha=1;
  }
  ctx.restore();
  requestAnimationFrame(loop);
}
function overLoop(){
  if(state!=='over')return;
  padMenuPoll();
  requestAnimationFrame(overLoop);
}
function gameOver(){
  state='over';
  const beat=score>record;
  if(beat){record=score;saveRecord();}
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.font='600 28px sans-serif';
  ctx.fillText('Game over',W/2,H/2-70);
  if(beat){
    ctx.fillStyle='#FAC775';ctx.font='600 21px sans-serif';
    ctx.fillText('\uD83C\uDFC6 \u00a1NUEVO R\u00c9CORD!',W/2,H/2-30);
  }
  ctx.fillStyle='#fff';ctx.font='400 17px sans-serif';
  ctx.fillText('Puntos: '+score+' \u00b7 Nivel '+level,W/2,H/2+6);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('Mejor: '+record+' pts',W/2,H/2+34);
  ctx.fillStyle='#9FE1CB';ctx.font='600 16px sans-serif';
  ctx.fillText('Toca para volver al men\u00fa',W/2,H/2+90);
  snd(beat?880:100,beat?0.4:1,beat?'triangle':'sawtooth',0.1);
  buzz(beat?[60,40,60,40,120]:300);
  setTimeout(()=>{padA=true;overLoop();},300);
}
function moveTo(cx,cy){
  const r=cv.getBoundingClientRect();
  ship.tx=Math.max(20,Math.min(W-20,(cx-r.left)*(W/r.width)));
  ship.ty=Math.max(MINY,Math.min(MAXY,(cy-r.top)*(H/r.height)-46));
}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state==='menu'){startGame();return;}
  if(state==='over'){state='menu';menuLoop();return;}
  moveTo(e.clientX,e.clientY);
});
cv.addEventListener('pointermove',e=>{if(state==='play'&&(e.buttons||e.pointerType==='touch')){e.preventDefault();moveTo(e.clientX,e.clientY);}});
window.addEventListener('keydown',e=>{
  const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(state==='menu'&&(k==='Enter'||k===' ')){startGame();e.preventDefault();return;}
  if(state==='over'&&(k==='Enter'||k===' ')){state='menu';menuLoop();e.preventDefault();return;}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'].includes(k)){keys[k]=true;e.preventDefault();}
});
window.addEventListener('keyup',e=>{const k=e.key.length===1?e.key.toLowerCase():e.key;keys[k]=false;});
menuLoop();
</script>
